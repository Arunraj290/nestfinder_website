<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Search — NestFinder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    body { overflow: hidden; }
    @media (max-width: 900px) { body { overflow: auto; } }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="mainNav">
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </div>
    Nest<span>Finder</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="map.html" class="active">Map Search</a>
    <a href="upload.html">List Property</a>
  </div>
  <div class="nav-cta">
    <a href="upload.html" class="btn-ghost">List Property</a>
  </div>
  <button class="nav-hamburger"><span></span><span></span><span></span></button>
</nav>

<!-- MAP LAYOUT -->
<div class="map-layout">

  <!-- SIDEBAR -->
  <div class="map-sidebar">
    <div class="map-search-box">
      <h2>🗺 Find Rentals</h2>

      <div class="search-input-wrap">
        <span>🔍</span>
        <input type="text" id="mapSearch" placeholder="Search city or area...">
        <button class="icon-btn" id="mapSearchBtn" title="Search">→</button>
      </div>

      <!-- Type filter chips -->
      <div class="map-tools" style="margin-bottom:10px">
        <button class="tool-btn map-filter-chip" data-type="apartment">🏢 Apartment</button>
        <button class="tool-btn map-filter-chip" data-type="house">🏠 House</button>
        <button class="tool-btn map-filter-chip" data-type="shop">🏪 Shop</button>
      </div>

      <!-- Draw tools -->
      <div class="map-tools">
        <button class="tool-btn" id="drawCircleBtn" title="Draw a circular search area">
          ⭕ Draw Circle
        </button>
        <button class="tool-btn" id="clearCircleBtn" title="Clear drawn circle">
          🗑 Clear
        </button>
      </div>

      <!-- Radius slider -->
      <div style="margin-top:12px;padding:12px;background:var(--mist);border-radius:10px">
        <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--gray-3);margin-bottom:6px">
          <span>Circle Radius</span>
          <strong id="radiusLabel" style="color:var(--coral)">5 km</strong>
        </div>
        <input type="range" id="radiusSlider" min="1" max="50" value="5" step="1"
          style="-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--gray-2);cursor:pointer;outline:none">
      </div>

      <div class="radius-info" id="radiusInfo">Click map to place circle center</div>
    </div>

    <!-- Results list -->
    <div class="sidebar-results">
      <div class="results-count" id="resultsCount">Loading properties...</div>
      <div id="sidebarResults"></div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <div id="map"></div>

    <!-- Floating controls -->
    <div class="map-controls">
      <div style="background:white;border-radius:12px;padding:12px 14px;box-shadow:var(--shadow-sm);font-size:0.75rem;color:var(--gray-3);max-width:200px;line-height:1.5">
        <strong style="color:var(--navy);display:block;margin-bottom:4px">💡 How to search</strong>
        1. Type a city to navigate<br>
        2. Click "Draw Circle" then click map<br>
        3. Adjust radius with slider
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
<style>
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: var(--coral); cursor: pointer;
    box-shadow: 0 2px 6px rgba(255,90,95,0.4);
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--coral); cursor: pointer; border: none;
  }
</style>
</body>
</html>
